databases:
  - name: academic-performance-db
    databaseName: academic_performance_db
    user: academic_user

services:
  - type: web
    name: academic-performance-prediction
    runtime: python
    rootDir: backend/python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: academic-performance-db
          property: connectionString
