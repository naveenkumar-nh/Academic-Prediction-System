<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Prediction System — Select Role</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-mesh::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 30%, rgba(124, 143, 255, 0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(34, 211, 238, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 30% 70%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
            animation: meshMove 25s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(-3%, 2%) scale(1.02);
            }

            100% {
                transform: translate(2%, -1%) scale(1);
            }
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .particle-1 {
            width: 350px;
            height: 350px;
            background: rgba(124, 143, 255, 0.08);
            filter: blur(80px);
            top: -100px;
            right: -100px;
            animation: p1 18s ease-in-out infinite;
        }

        .particle-2 {
            width: 280px;
            height: 280px;
            background: rgba(168, 85, 247, 0.06);
            filter: blur(70px);
            bottom: -80px;
            left: -80px;
            animation: p2 22s ease-in-out infinite;
        }

        .particle-3 {
            width: 200px;
            height: 200px;
            background: rgba(34, 211, 238, 0.06);
            filter: blur(60px);
            top: 40%;
            right: 20%;
            animation: p3 15s ease-in-out infinite;
        }

        @keyframes p1 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-50px, 60px);
            }
        }

        @keyframes p2 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(60px, -40px);
            }
        }

        @keyframes p3 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-40px, -50px);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
        }

        .logo {
            margin-bottom: 1rem;
            animation: fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #7c8fff 0%, #a855f7 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 32px rgba(124, 143, 255, 0.4), 0 0 60px rgba(124, 143, 255, 0.15);
            animation: logoPulse 3s ease-in-out infinite;
        }

        @keyframes logoPulse {

            0%,
            100% {
                box-shadow: 0 8px 32px rgba(124, 143, 255, 0.4), 0 0 60px rgba(124, 143, 255, 0.15);
            }

            50% {
                box-shadow: 0 8px 40px rgba(124, 143, 255, 0.5), 0 0 80px rgba(124, 143, 255, 0.2);
            }
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #7c8fff 0%, #a855f7 50%, #22d3ee 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #6a6a90;
            font-size: 1.05rem;
            font-weight: 400;
            margin-bottom: 3rem;
            letter-spacing: 0.01em;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .roles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .role-card {
            position: relative;
            background: rgba(16, 16, 48, 0.5);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(124, 143, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            cursor: pointer;
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .role-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.2), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .role-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(124, 143, 255, 0.25);
        }

        .role-card:hover::before {
            opacity: 1;
        }

        .role-admin::before {
            background: linear-gradient(90deg, #7c8fff, #a855f7);
        }

        .role-admin:hover {
            box-shadow: 0 20px 60px rgba(124, 143, 255, 0.25), 0 0 40px rgba(124, 143, 255, 0.1);
        }

        .role-staff::before {
            background: linear-gradient(90deg, #34d399, #06b6d4);
        }

        .role-staff:hover {
            box-shadow: 0 20px 60px rgba(52, 211, 153, 0.25), 0 0 40px rgba(52, 211, 153, 0.1);
        }

        .role-student::before {
            background: linear-gradient(90deg, #fbbf24, #f97316);
        }

        .role-student:hover {
            box-shadow: 0 20px 60px rgba(251, 191, 36, 0.25), 0 0 40px rgba(251, 191, 36, 0.1);
        }

        .role-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 1.2rem;
            transition: transform 0.4s;
        }

        .role-card:hover .role-icon {
            transform: scale(1.1) rotate(-3deg);
        }

        .role-admin .role-icon {
            background: linear-gradient(135deg, rgba(124, 143, 255, 0.2), rgba(168, 85, 247, 0.15));
            color: #7c8fff;
            box-shadow: 0 4px 20px rgba(124, 143, 255, 0.2);
        }

        .role-staff .role-icon {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(6, 182, 212, 0.15));
            color: #34d399;
            box-shadow: 0 4px 20px rgba(52, 211, 153, 0.2);
        }

        .role-student .role-icon {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(249, 115, 22, 0.15));
            color: #fbbf24;
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.2);
        }

        .role-name {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .role-desc {
            font-size: 0.85rem;
            color: #6a6a90;
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .role-arrow {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: gap 0.3s;
        }

        .role-admin .role-arrow {
            color: #7c8fff;
        }

        .role-staff .role-arrow {
            color: #34d399;
        }

        .role-student .role-arrow {
            color: #fbbf24;
        }

        .role-card:hover .role-arrow {
            gap: 12px;
        }

        @media (max-width: 768px) {
            .roles-grid {
                grid-template-columns: 1fr;
                max-width: 340px;
                margin: 0 auto;
            }

            .title {
                font-size: 1.8rem;
            }

            .role-card {
                padding: 2rem 1.5rem;
            }
        }

        .role-card {
            opacity: 0;
            transform: translateY(30px);
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>

    <div class="container">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1 class="title">Academic Prediction System</h1>
            <p class="subtitle">Select your role to continue</p>
        </div>

        <div class="roles-grid">
            <a th:href="@{/login/admin}" class="role-card role-admin">
                <div class="role-icon"><i class="fas fa-user-shield"></i></div>
                <div class="role-name">Admin</div>
                <div class="role-desc">Manage staff accounts and system settings</div>
                <div class="role-arrow">Sign in <i class="fas fa-arrow-right"></i></div>
            </a>

            <a th:href="@{/login/staff}" class="role-card role-staff">
                <div class="role-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                <div class="role-name">Staff</div>
                <div class="role-desc">Add students, enter marks, and run predictions</div>
                <div class="role-arrow">Sign in <i class="fas fa-arrow-right"></i></div>
            </a>

            <a th:href="@{/login/student}" class="role-card role-student">
                <div class="role-icon"><i class="fas fa-user-graduate"></i></div>
                <div class="role-name">Student</div>
                <div class="role-desc">View your results, grades, and suggestions</div>
                <div class="role-arrow">Sign in <i class="fas fa-arrow-right"></i></div>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.role-card');
            cards.forEach((card, i) => {
                setTimeout(() => {
                    card.style.transition = 'all 0.7s cubic-bezier(0.16, 1, 0.3, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 300 + i * 120);
            });
        });
    </script>
</body>

</html>
