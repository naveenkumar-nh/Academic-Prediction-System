<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="'Edit Student — ' + ${student.name}">Edit Student</title>
    <th:block th:insert="~{base :: head_css}" />
</head>

<body>
    <th:block th:insert="~{base :: orbs}" />
    <th:block th:insert="~{base :: navbar}" />
    <th:block th:insert="~{base :: flash_messages}" />

    <div class="main-content fade-in">
        <div class="page-header">
            <h1><i class="fas fa-user-edit"></i> Edit Student</h1>
            <p>Update details for: <strong th:text="${student.name}">Name</strong> (<span
                    th:text="${student.regNo}">REG</span>)</p>
        </div>

        <div class="card" style="max-width: 700px;">
            <div class="card-title"><i class="fas fa-edit"></i> Student Details</div>
            <form method="POST" th:action="@{/dashboard/staff/edit-student/{r}(r=${student.regNo})}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Register Number</label>
                        <input type="text" class="form-control" th:value="${student.regNo}" disabled
                            style="opacity: 0.6; cursor: not-allowed;">
                        <small style="color: var(--text-muted); font-size: 0.75rem;">Register number cannot be
                            changed</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" th:value="${student.name}"
                            placeholder="Student full name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Department</label>
                        <select name="dept" class="form-control" required>
                            <option value="">Select Dept</option>
                            <option value="CSE" th:selected="${student.dept == 'CSE'}">CSE</option>
                            <option value="ECE" th:selected="${student.dept == 'ECE'}">ECE</option>
                            <option value="EEE" th:selected="${student.dept == 'EEE'}">EEE</option>
                            <option value="MECH" th:selected="${student.dept == 'MECH'}">MECH</option>
                            <option value="CIVIL" th:selected="${student.dept == 'CIVIL'}">CIVIL</option>
                            <option value="IT" th:selected="${student.dept == 'IT'}">IT</option>
                            <option value="AIDS" th:selected="${student.dept == 'AIDS'}">AIDS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Year</label>
                        <select name="year" class="form-control" required>
                            <option value="">Select Year</option>
                            <option value="1" th:selected="${student.year == 1}">1st Year</option>
                            <option value="2" th:selected="${student.year == 2}">2nd Year</option>
                            <option value="3" th:selected="${student.year == 3}">3rd Year</option>
                            <option value="4" th:selected="${student.year == 4}">4th Year</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password <span
                            style="color: var(--text-muted); font-weight: 400;">(leave
                            blank to keep current)</span></label>
                    <input type="password" name="password" class="form-control"
                        placeholder="Enter new password (min 4 chars)" minlength="4">
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Changes</button>
                    <a th:href="${userRole == 'admin' ? '/dashboard/admin' : '/dashboard/staff'}"
                        class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back</a>
                </div>
            </form>
        </div>
    </div>

    <th:block th:insert="~{base :: base_js}" />
</body>

</html>
